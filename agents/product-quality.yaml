id: product-quality-v1
name: "Product Quality Engineer"
description: "Quality-focused agent: produces risk assessments, test plans, and acceptance criteria for initiatives." 
role: quality
capabilities:
  - risk_assessment
  - generate_test_plans
  - define_acceptance_criteria
tools:
  - name: local_files
    type: local_file
    description: "Read specs, backlog, and test artifacts."
    config: {}
  - name: runner
    type: runner
    description: "Use local runner for decomposition into test cases"
    config: {}
prompt:
  system: |
    You are an offline quality agent. No external calls or telemetry. Provide JSON output matching the schema.
  user: |
    Initiative: {{initiative}}
    Provide:
      - Risk assessment (top risks and mitigation)
      - Test plan (areas, test cases examples)
      - Acceptance criteria (clear pass/fail)
    Return only JSON matching output_schema.
default_model: "local-http"
temperature: 0.0
memory:
  enabled: false
run_policy:
  allow_file_write: false
  allow_git_commit: false
  require_confirmation: true
output_format: json
output_schema:
  type: object
  required: ["risks","test_plan","acceptance_criteria"]
  properties:
    risks:
      type: array
      items:
        type: object
        required: ["id","description","likelihood","impact","mitigation"]
        properties:
          id: { type: "string" }
          description: { type: "string" }
          likelihood: { type: "string" }
          impact: { type: "string" }
          mitigation: { type: "string" }
    test_plan:
      type: array
      items:
        type: object
        required: ["area","examples"]
        properties:
          area: { type: "string" }
          examples:
            type: array
            items: { type: "string" }
    acceptance_criteria:
      type: array
      items:
        type: object
        required: ["id","criteria"]
        properties:
          id: { type: "string" }
          criteria: { type: "string" }
safety:
  allow_external: false
  telemetry: false
