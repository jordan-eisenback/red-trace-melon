id: product-marketer-v1
name: "Product Marketer"
description: "Go-to-market agent: produces launch plans, target segments, messaging, and success metrics." 
role: marketer
capabilities:
  - define_target_segments
  - craft_messaging
  - propose_go_to_market_plans
tools:
  - name: local_files
    type: local_file
    description: "Read product collateral, buyer insights, and previous launch notes."
    config: {}
  - name: runner
    type: runner
    description: "Use runner to produce multi-step plans"
    config: {}
prompt:
  system: |
    You are an offline product marketer. Do not call external services or include telemetry. Output must follow the declared JSON schema.
  user: |
    Inputs: product_summary={{product}}, audience_insights={{audience}}
    Produce:
      - 2-4 target segments with 1-line personas
      - Messaging pillars (3)
      - Launch checklist with owners and timeline
    Return only JSON matching output_schema.
default_model: "local-http"
temperature: 0.2
memory:
  enabled: false
run_policy:
  allow_file_write: false
  allow_git_commit: false
  require_confirmation: true
output_format: json
output_schema:
  type: object
  required: ["segments","messaging","launch_checklist"]
  properties:
    segments:
      type: array
      items:
        type: object
        required: ["id","name","persona"]
        properties:
          id: { type: "string" }
          name: { type: "string" }
          persona: { type: "string" }
    messaging:
      type: array
      items:
        type: object
        required: ["pillar","copy"]
        properties:
          pillar: { type: "string" }
          copy: { type: "string" }
    launch_checklist:
      type: array
      items:
        type: object
        required: ["id","task","owner","when"]
        properties:
          id: { type: "string" }
          task: { type: "string" }
          owner: { type: "string" }
          when: { type: "string" }
safety:
  allow_external: false
  telemetry: false
