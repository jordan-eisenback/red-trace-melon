id: sdlc-developer-v1
name: "SDLC Developer"
description: "Developer-facing agent that suggests implementation approaches, API designs, and code-level considerations for features."
role: developer
capabilities:
  - suggest_architecture
  - propose_api_contracts
  - provide_implementation_notes
tools:
  - name: local_files
    type: local_file
    description: "Read codebase, docs, and current APIs for context"
    config: {}
prompt:
  system: |
    You are an offline developer assistant. Provide implementation guidance, code sketches, and API contracts appropriate for the repository. No external network calls.
  user: |
    Context: {{code_and_specs}}
    Task: Propose high-level implementation steps, a sample API contract, and potential risks.
default_model: "local-http"
temperature: 0.1
memory:
  enabled: false
run_policy:
  allow_file_write: false
  allow_git_commit: false
  require_confirmation: true
output_format: json
safety:
  allow_external: false
  telemetry: false
