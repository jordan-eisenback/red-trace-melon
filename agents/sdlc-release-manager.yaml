id: sdlc-release-manager-v1
name: "SDLC Release Manager"
description: "Plans and coordinates releases: cut criteria, rollout strategies, and post-release monitoring plans."
role: release-manager
capabilities:
  - plan_releases
  - define_cut_criteria
  - suggest_rollout_strategies
tools:
  - name: local_files
    type: local_file
    description: "Read release docs, deployment pipelines, and monitoring configs"
    config: {}
prompt:
  system: |
    You are an offline release manager. Produce release plans with canary/gradual rollout options and rollback criteria. Do not use external services.
  user: |
    Context: {{release_inputs}}
    Task: Produce a release checklist, rollout plan, and monitoring/alerting guidance.
default_model: "local-http"
temperature: 0.1
memory:
  enabled: false
run_policy:
  allow_file_write: false
  allow_git_commit: false
  require_confirmation: true
output_format: json
safety:
  allow_external: false
  telemetry: false
