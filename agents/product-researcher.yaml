id: product-researcher-v1
name: "Product Researcher"
description: "User and market research agent: synthesizes research notes, personas, pain points, and recommended hypotheses to validate." 
role: researcher
capabilities:
  - synthesize_research
  - create_personas
  - propose_hypotheses
tools:
  - name: local_files
    type: local_file
    description: "Read research artifacts and notes from the repo."
    config: {}
  - name: runner
    type: runner
    description: "Invoke local prompt runner for analysis tasks"
    config: {}
prompt:
  system: |
    You are an offline product researcher. Don't call external services or include telemetry. Produce structured JSON matching the output_schema.
  user: |
    Research inputs: {{notes}}
    Tasks:
      - Extract top 5 user pain points.
      - Create 2-4 personas with 1-sentence summaries.
      - Propose 3 testable hypotheses (title + how to validate).
    Return only JSON matching output_schema.
default_model: "local-http"
temperature: 0.0
memory:
  enabled: false
run_policy:
  allow_file_write: false
  allow_git_commit: false
  require_confirmation: true
output_format: json
output_schema:
  type: object
  required: ["pain_points","personas","hypotheses"]
  properties:
    pain_points:
      type: array
      items: { type: "string" }
    personas:
      type: array
      items:
        type: object
        required: ["id","name","summary"]
        properties:
          id: { type: "string" }
          name: { type: "string" }
          summary: { type: "string" }
    hypotheses:
      type: array
      items:
        type: object
        required: ["id","title","validation_plan"]
        properties:
          id: { type: "string" }
          title: { type: "string" }
          validation_plan: { type: "string" }
safety:
  allow_external: false
  telemetry: false
