name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  quality:
    name: Typecheck · Lint · Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Bundle size gate (main entry chunk < 500 KB gzipped)
        run: |
          # Find the main JS entry chunk (largest index-*.js file in dist/assets)
          CHUNK=$(ls dist/assets/index-*.js 2>/dev/null | head -1)
          if [ -z "$CHUNK" ]; then
            echo "No index chunk found in dist/assets — build may have failed"
            exit 1
          fi
          GZIP_SIZE=$(gzip -c "$CHUNK" | wc -c)
          LIMIT=$((500 * 1024))
          echo "Main entry chunk: $CHUNK"
          echo "Gzipped size: $GZIP_SIZE bytes (limit: $LIMIT bytes)"
          if [ "$GZIP_SIZE" -gt "$LIMIT" ]; then
            echo "FAIL: main entry chunk exceeds 500 KB gzipped ($GZIP_SIZE > $LIMIT)"
            exit 1
          fi
          echo "PASS: main entry chunk is within limit"

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
