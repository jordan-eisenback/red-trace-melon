name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  quality:
    name: Typecheck · Lint · Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Bundle size gate (main entry chunk < 500 KB gzipped)
        run: |
          # Find the main JS entry chunk (largest index-*.js file in dist/assets)
          CHUNK=$(ls dist/assets/index-*.js 2>/dev/null | head -1)
          if [ -z "$CHUNK" ]; then
            echo "No index chunk found in dist/assets — build may have failed"
            exit 1
          fi
          GZIP_SIZE=$(gzip -c "$CHUNK" | wc -c)
          LIMIT=$((500 * 1024))
          echo "Main entry chunk: $CHUNK"
          echo "Gzipped size: $GZIP_SIZE bytes (limit: $LIMIT bytes)"
          if [ "$GZIP_SIZE" -gt "$LIMIT" ]; then
            echo "FAIL: main entry chunk exceeds 500 KB gzipped ($GZIP_SIZE > $LIMIT)"
            exit 1
          fi
          echo "PASS: main entry chunk is within limit"

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  agent-review:
    name: Agent Code Review
    runs-on: ubuntu-latest
    needs: e2e
    # Skip entirely if the ENABLE_AGENT_REVIEW secret is not set.
    # This keeps the job non-blocking for forks and environments without
    # a GitHub Models-capable token configured.
    # To enable: add a repo secret named ENABLE_AGENT_REVIEW with any non-empty value.
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Check opt-in secret
        id: opt_in
        run: |
          # Require ENABLE_AGENT_REVIEW *and* a token that has the models permission.
          # The built-in GITHUB_TOKEN does NOT have the `models` scope, so callers
          # must add a PAT (with models permission) as GITHUB_MODELS_TOKEN.
          if [ -z "$ENABLE_AGENT_REVIEW" ]; then
            echo "ENABLE_AGENT_REVIEW secret not set — skipping agent review"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          elif [ -z "$GITHUB_MODELS_TOKEN" ]; then
            echo "GITHUB_MODELS_TOKEN secret not set — skipping agent review (a PAT with 'models' permission is required)"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          ENABLE_AGENT_REVIEW: ${{ secrets.ENABLE_AGENT_REVIEW }}
          GITHUB_MODELS_TOKEN: ${{ secrets.GITHUB_MODELS_TOKEN }}

      - name: Checkout
        if: steps.opt_in.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        if: steps.opt_in.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.opt_in.outputs.enabled == 'true'
        run: npm ci

      - name: Get changed files
        if: steps.opt_in.outputs.enabled == 'true'
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | head -40 | tr '\n' ' ')
          else
            FILES=$(git diff --name-only HEAD~1 HEAD | head -40 | tr '\n' ' ')
          fi
          echo "files=$FILES" >> "$GITHUB_OUTPUT"

      - name: Run agent:review on changed files
        if: steps.opt_in.outputs.enabled == 'true'
        id: review
        env:
          # Use the PAT with models permission — the built-in GITHUB_TOKEN lacks it.
          # The github-models-adapter reads GITHUB_TOKEN first, so we shadow it here.
          GITHUB_TOKEN: ${{ secrets.GITHUB_MODELS_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          GOAL="Review the following changed files for this PR and report findings: ${{ steps.changed.outputs.files }}"
          npm run agent:review -- --goal "$GOAL" --no-git
          OUTPUT_FILE=$(ls -t storage/agents/output/code-reviewer-v1/*.json 2>/dev/null | head -1)
          echo "output_file=$OUTPUT_FILE" >> "$GITHUB_OUTPUT"

      - name: Format and post PR comment
        if: steps.opt_in.outputs.enabled == 'true' && github.event_name == 'pull_request' && steps.review.outputs.output_file != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OUTPUT_FILE: ${{ steps.review.outputs.output_file }}
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const file = process.env.OUTPUT_FILE;
          if (!file || !fs.existsSync(file)) { console.log('No output file — skipping comment'); process.exit(0); }
          const d = JSON.parse(fs.readFileSync(file, 'utf8'));
          const o = d.output;
          const findings = o.findings ?? [];
          const high   = findings.filter(f => f.severity === 'high');
          const medium = findings.filter(f => f.severity === 'medium');
          const low    = findings.filter(f => f.severity === 'low');
          const badge  = high.length ? '🔴' : medium.length ? '🟡' : '🟢';
          let body = `## ${badge} Agent Code Review\n\n`;
          body += `**Summary:** ${o.summary}\n\n`;
          body += `**Findings:** ${findings.length} total`;
          if (high.length)   body += ` · ${high.length} 🔴 high`;
          if (medium.length) body += ` · ${medium.length} 🟡 medium`;
          if (low.length)    body += ` · ${low.length} 🔵 low`;
          body += '\n\n';
          if (findings.length) {
            body += '| Severity | Type | File | Message |\n|---|---|---|---|\n';
            for (const f of findings) {
              const sev  = f.severity === 'high' ? '🔴 high' : f.severity === 'medium' ? '🟡 medium' : '🔵 low';
              const loc  = f.file ? `\`${f.file}\`` : '—';
              body += `| ${sev} | ${f.type} | ${loc} | ${f.message.replace(/\|/g, '\\|')} |\n`;
            }
          }
          body += `\n<sub>Generated by code-reviewer-v1 · ${new Date(d.timestamp).toUTCString()}</sub>`;
          fs.writeFileSync('review-comment.md', body);
          EOF
          gh pr comment ${{ github.event.pull_request.number }} --body-file review-comment.md
