# yaml-language-server: $schema=https://aka.ms/teams-toolkit/v1.11/yaml.schema.json
#
# Microsoft 365 Agents Toolkit — project configuration
#
# Usage:
#   Provision: open M365 Agents Toolkit panel → Accounts (sign in with M365 account)
#              → Lifecycle → Provision
#   This creates the AAD app registration and writes credentials into
#   .env/.env.local  (MicrosoftAppId, MicrosoftAppTenantId)
#   .env/.env.local.user  (SECRET_AAD_APP_CLIENT_SECRET) ← gitignored
#
version: v1.11

projectId: red-trace-melon-agents

environmentFolderPath: ./env

provision:
  # Step 1: Create the AAD application registration.
  # On first run this creates the app and writes all output vars to env/.env.local
  # (public vars) and env/.env.local.user (SECRET_* vars, gitignored).
  - uses: aadApp/create
    with:
      name: red-trace-melon-agent-runner
      generateClientSecret: true
      signInAudience: AzureADMyOrg
    writeToEnvironmentFile:
      clientId: MICROSOFT_APP_ID
      objectId: MICROSOFT_APP_OBJECT_ID
      tenantId: MICROSOFT_APP_TENANT_ID
      clientSecret: SECRET_AAD_APP_CLIENT_SECRET
      authority: AAD_APP_OAUTH_AUTHORITY
      authorityHost: AAD_APP_OAUTH_AUTHORITY_HOST

  # Step 2: Write friendly alias names the adapter also reads.
  - uses: file/createOrUpdateEnvironmentFile
    with:
      target: ./env/.env.local
      envs:
        MicrosoftAppId: ${{MICROSOFT_APP_ID}}
        MicrosoftAppTenantId: ${{MICROSOFT_APP_TENANT_ID}}
